    <script>
      const trigger = document.getElementById("contact-trigger");
      const email = document.getElementById("contact-email");
      if (trigger && email) {
        trigger.addEventListener("click", () => {
          const isHidden = email.hasAttribute("hidden");
          if (isHidden) {
            email.removeAttribute("hidden");
            trigger.setAttribute("aria-expanded", "true");
            trigger.setAttribute("data-label", "Hide email");
          } else {
            email.setAttribute("hidden", "");
            trigger.setAttribute("aria-expanded", "false");
            trigger.setAttribute("data-label", "Contact me");
          }
        });
      }
    </script>
